<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --bg: #f4f7f6;
            --text-main: #2d3436;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Chakra Petch', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: #636e72;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .menu-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(108, 92, 231, 0.15);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .menu-card h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .menu-card p {
            color: #636e72;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .badge-writing { background: #e1f0ff; color: #4a90e2; }
        .badge-typing { background: #f0edff; color: var(--primary); }

        .footer {
            margin-top: auto;
            padding-top: 50px;
            font-size: 0.9rem;
            color: #b2bec3;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>เรียนภาษาญี่ปุ่น</h1>
            <p>เลือกโหมดการฝึกฝนที่คุณต้องการ</p>
        </header>

        <div class="menu-grid">
            <!-- ลิงก์ไปยังหน้าฝึกเขียน Kanji (ไฟล์แรกที่เราคุยกัน) -->
            <a href="kanji_practice.html" class="menu-card">
                <div class="icon">✍️</div>
                <span class="badge badge-writing">Handwriting</span>
                <h2>ฝึกเขียนตัวอักษร</h2>
                <p>ฝึกเขียนคันจิและฮิรางานะตามลำดับขีดที่ถูกต้อง พร้อมระบบตรวจลายมือ</p>
            </a>

            <!-- ลิงก์ไปยังหน้าฝึกพิมพ์ Hiragana (ไฟล์ index.html ปัจจุบัน) -->
            <a href="hiragana_practice.html" class="menu-card">
                <div class="icon">⌨️</div>
                <span class="badge badge-typing">Typing</span>
                <h2>ฝึกพิมพ์คำศัพท์</h2>
                <p>ฝึกจำคำศัพท์และความหมายผ่านการพิมพ์ฮิรางานะ พร้อมระบบเช็คคำตอบ</p>
            </a>
        </div>

        <footer class="footer">
            &copy; 2024 Japanese Learning Hub - พัฒนาเพื่อการเรียนรู้
        </footer>
    </div>

</body>
</html>
